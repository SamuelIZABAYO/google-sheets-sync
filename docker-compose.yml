services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - sqlite_data:/data
    expose:
      - "3001"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-app.automationglass.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:
